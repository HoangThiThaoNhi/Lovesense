name: lovesense
description: "SwipeRight: A stunning, modern dating app UI that redefines connection with sleek gradients, smooth animations, and a touch of glassmorphism, all built with a clean, scalable Flutter frontend."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  intl: 0.20.2
  image_picker: '>=1.1.2'
  cached_network_image: ^3.0.0
  font_awesome_flutter: ^10.0.0
  flutter_animate: ^4.0.0
  flutter_card_swiper: ^7.0.0
  flutter_riverpod: ^2.6.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  http: ^1.6.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  flutter_svg: ^2.2.4
  shared_preferences: ^2.5.5
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # Fonts: add Google Sans Flex files under assets/fonts/
  fonts:
    - family: Google Sans Flex
      fonts:
        - asset: assets/fonts/static/GoogleSansFlex_24pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/static/GoogleSansFlex_24pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/GoogleSansFlex_24pt-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true